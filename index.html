let current=0;

function start(i){
  current=i;
  document.getElementById("home").style.display="none";
  document.getElementById("res").style.display="none";
  document.getElementById("bar").style.display="flex";
  const test=document.getElementById("test");
  test.innerHTML=`<div class="card"><h2>${i+1}-нұсқа</h2><p>Әр сұраққа бір дұрыс жауап белгілеңіз. Соңында «Нәтижені көру» батырмасын басыңыз.</p></div>`;
  V[i].forEach((x,n)=>{
    let opts=x.o.map((t,k)=>`<label id="l${n}_${k}"><input type="radio" name="q${n}" value="${k}"> ${String.fromCharCode(65+k)}) ${t}</label>`).join("");
    test.innerHTML+=`<div class="card qcard" id="q${n}"><span class="ctx">${x.c}</span><h3>${n+1}. ${x.q}</h3>${opts}<div class="exp" id="e${n}"></div></div>`;
  });
  window.scrollTo(0,0);
}

function check(){
  let data=V[current];
  let correct=0;
  data.forEach((x,n)=>{
    let chosen=document.querySelector(`input[name="q${n}"]:checked`);
    let val=chosen?Number(chosen.value):-1;
    for(let k=0;k<x.o.length;k++){
      document.getElementById(`l${n}_${k}`).classList.remove("ok","no");
    }
    document.getElementById(`l${n}_${x.a}`).classList.add("ok");
    if(val===x.a){
      correct++;
    }else if(val>-1){
      document.getElementById(`l${n}_${val}`).classList.add("no");
    }
    let exp=document.getElementById(`e${n}`);
    exp.style.display="block";
    exp.innerHTML=`<b>Дұрыс жауап: ${String.fromCharCode(65+x.a)}) ${x.o[x.a]}.</b><br>Түсіндіру: бұл жауап берілген контексттегі негізгі химиялық ұғымға, формулаға немесе есептеу нәтижесіне сәйкес келеді. Егер басқа жауап таңдалса, онда ол контексттегі шартпен немесе химиялық заңдылықпен сәйкес келмейді.`;
  });
  let percent=Math.round(correct/data.length*100);
  let res=document.getElementById("res");
  res.style.display="block";
  res.innerHTML=`<h2>Нәтиже</h2><div class="score">${correct}/${data.length}</div><p>Пайыздық көрсеткіш: <b>${percent}%</b></p><p>${current+1}-нұсқа бойынша тест аяқталды. Төменде әр сұрақтың дұрыс жауабы жасыл түспен, қате таңдалған жауап қызыл түспен көрсетілді.</p>`;
  res.scrollIntoView({behavior:"smooth"});
}

function home(){
  document.getElementById("home").style.display="block";
  document.getElementById("test").innerHTML="";
  document.getElementById("res").style.display="none";
  document.getElementById("bar").style.display="none";
  window.scrollTo(0,0);
}
