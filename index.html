  let current = 0;

function escapeHTML(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function start(index){
  current = index;

  const home = document.getElementById("home");
  const test = document.getElementById("test");
  const res = document.getElementById("res");
  const bar = document.getElementById("bar");

  home.style.display = "none";
  res.style.display = "none";
  bar.style.display = "flex";

  const data = V[current];

  let html = `
    <div class="card">
      <h2>${current + 1}-нұсқа</h2>
      <p class="muted">Әр сұраққа бір дұрыс жауап белгілеңіз. Соңында «Нәтижені көру» батырмасын басыңыз.</p>
    </div>
  `;

  data.forEach((item, n) => {
    let optionsHTML = "";

    item.o.forEach((option, k) => {
      optionsHTML += `
        <label id="l_${n}_${k}">
          <input type="radio" name="q_${n}" value="${k}">
          ${String.fromCharCode(65 + k)}) ${escapeHTML(option)}
        </label>
      `;
    });

    html += `
      <div class="card qcard" id="card_${n}">
        <span class="ctx">${escapeHTML(item.c)}</span>
        <h3>${n + 1}. ${escapeHTML(item.q)}</h3>
        ${optionsHTML}
        <div class="exp" id="e_${n}"></div>
      </div>
    `;
  });

  test.innerHTML = html;
  window.scrollTo({top:0, behavior:"smooth"});
}

function check(){
  const data = V[current];
  let correct = 0;
  let unanswered = 0;

  data.forEach((item, n) => {
    const chosen = document.querySelector(`input[name="q_${n}"]:checked`);
    const selected = chosen ? Number(chosen.value) : -1;

    item.o.forEach((option, k) => {
      const label = document.getElementById(`l_${n}_${k}`);
      if(label){
        label.classList.remove("ok","no");
      }
    });

    const rightLabel = document.getElementById(`l_${n}_${item.a}`);
    if(rightLabel){
      rightLabel.classList.add("ok");
    }

    if(selected === item.a){
      correct++;
    }else{
      if(selected === -1){
        unanswered++;
      }else{
        const wrongLabel = document.getElementById(`l_${n}_${selected}`);
        if(wrongLabel){
          wrongLabel.classList.add("no");
        }
      }
    }

    const exp = document.getElementById(`e_${n}`);
    if(exp){
      exp.style.display = "block";
      exp.innerHTML = `
        <b>Дұрыс жауап: ${String.fromCharCode(65 + item.a)}) ${escapeHTML(item.o[item.a])}.</b><br>
        <span>
          Түсіндіру: дұрыс жауап сұрақтағы химиялық ұғымға, формулаға, реакция заңдылығына немесе есептеу нәтижесіне сәйкес келеді.
        </span>
      `;
    }
  });

  const percent = Math.round((correct / data.length) * 100);
  const res = document.getElementById("res");

  let levelText = "";
  if(percent >= 85){
    levelText = "Өте жақсы нәтиже.";
  }else if(percent >= 70){
    levelText = "Жақсы нәтиже, бірақ бірнеше тақырыпты қайталау керек.";
  }else if(percent >= 50){
    levelText = "Орташа нәтиже. Қате сұрақтардың түсіндіруін қарап шық.";
  }else{
    levelText = "Қайталау қажет. Алдымен негізгі формулалар мен ұғымдарды бекіткен дұрыс.";
  }

  res.style.display = "block";
  res.innerHTML = `
    <h2>Нәтиже</h2>
    <div class="score">${correct}/${data.length}</div>
    <p>Пайыздық көрсеткіш: <b>${percent}%</b></p>
    <p>${levelText}</p>
    ${
      unanswered > 0
      ? `<div class="warn">Жауап берілмеген сұрақ саны: <b>${unanswered}</b>.</div>`
      : ``
    }
    <p class="muted">
      Төменде дұрыс жауаптар жасыл түспен, қате таңдалған жауаптар қызыл түспен көрсетілді.
    </p>
  `;

  res.scrollIntoView({behavior:"smooth"});
}

function goHome(){
  document.getElementById("home").style.display = "block";
  document.getElementById("test").innerHTML = "";
  document.getElementById("res").style.display = "none";
  document.getElementById("bar").style.display = "none";
  window.scrollTo({top:0, behavior:"smooth"});
}
